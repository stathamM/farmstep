<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmStep 診断</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50">
    <div class="max-w-2xl mx-auto py-20 px-4">
        <h1 class="text-3xl font-bold text-green-700 mb-8">
            農業スタート診断
        </h1>

        <form action="/result" method="post" class="space-y-6 bg-white p-8 rounded-2xl shadow">
			
			<input type="hidden" name="userId" th:value="${userId}">

            <div>
                <label class="block mb-2 font-semibold">農業経験</label>
                <select name="experience" class="w-full border rounded-lg px-4 py-3">
                    <option value="none">経験なし</option>
                    <option value="little">少しある</option>
                    <option value="yes">経験あり</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 font-semibold">地方移住の意思</label>
                <select name="migration" class="w-full border rounded-lg px-4 py-3">
                    <option value="yes">ある</option>
                    <option value="maybe">少しある</option>
                    <option value="no">ない</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 font-semibold">初期資金</label>
                <select name="budget" class="w-full border rounded-lg px-4 py-3">
                    <option value="0">ほぼない</option>
                    <option value="100">100万円くらい</option>
                    <option value="300">300万円以上</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 font-semibold">安定収入はどれくらい重要ですか？</label>
                <select name="stability" class="w-full border rounded-lg px-4 py-3">
                    <option value="high">とても重要</option>
                    <option value="medium">ある程度重要</option>
                    <option value="low">挑戦重視</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 font-semibold">将来的に独立したいですか？</label>
                <select name="independence" class="w-full border rounded-lg px-4 py-3">
                    <option value="yes">したい</option>
                    <option value="maybe">少ししたい</option>
                    <option value="no">したくない</option>
                </select>
            </div>

            <button type="submit"
                    class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700">
                診断する
            </button>
        </form>
    </div>
</body>
</html>
