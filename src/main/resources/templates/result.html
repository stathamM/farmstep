<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診断結果</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50">
    <div class="max-w-3xl mx-auto py-20 px-4">
        <div class="bg-white rounded-2xl shadow p-8">

            <h1 class="text-4xl font-bold text-green-700 text-center">
                診断結果
            </h1>

            <p class="mt-8 text-xl text-gray-600 text-center">
                あなたにおすすめのタイプ
            </p>

            <p class="mt-4 text-3xl font-bold text-gray-800 text-center"
               th:text="${result.type}">
            </p>

            <div class="mt-8">
                <h2 class="text-lg font-bold text-green-700 mb-3">このタイプの特徴</h2>
                <p class="text-gray-700 leading-8 whitespace-pre-line"
                   th:text="${result.message}">
                </p>
            </div>

            <div class="mt-8 bg-blue-50 rounded-xl p-6">
                <h2 class="text-lg font-bold text-blue-700 mb-3">向いている始め方</h2>
                <p class="text-gray-700 leading-7 whitespace-pre-line"
                   th:text="${result.recommendedStyle}">
                </p>
            </div>

            <div class="mt-8 bg-green-50 rounded-xl p-6">
                <h2 class="text-lg font-bold text-green-700 mb-3">次にやること</h2>
                <p class="text-gray-700 leading-7 whitespace-pre-line"
                   th:text="${result.nextAction}">
                </p>
            </div>

            <div class="mt-8 bg-yellow-50 rounded-xl p-6">
                <h2 class="text-lg font-bold text-yellow-700 mb-3">資金ロードマップ</h2>
                <p class="text-gray-700 leading-7 whitespace-pre-line"
                   th:text="${result.funding}">
                </p>
            </div>

            <div class="mt-8 bg-emerald-50 rounded-xl p-6">
                <h2 class="text-lg font-bold text-emerald-700 mb-3">おすすめ地域</h2>

                <div class="space-y-2" th:if="${result.regions != null and !#lists.isEmpty(result.regions)}">
                    <div th:each="region : ${result.regions}"
                         class="bg-white rounded-lg px-4 py-3 border">
                        <span class="font-semibold text-gray-800"
                              th:text="${region.displayName}"></span>
                    </div>
                </div>

                <p class="text-gray-700"
                   th:if="${result.regions == null or #lists.isEmpty(result.regions)}">
                    まだ地域情報は登録されていません。
                </p>
            </div>

            <div class="mt-8 bg-red-50 rounded-xl p-6">
                <h2 class="text-lg font-bold text-red-700 mb-3">注意ポイント</h2>
                <p class="text-gray-700 leading-7 whitespace-pre-line"
                   th:text="${result.caution}">
                </p>
            </div>

            <div class="mt-8 bg-white rounded-2xl shadow p-6">
                <h2 class="text-lg font-bold text-green-700 mb-3">次に見てみる公式情報</h2>

                <div class="space-y-4" th:if="${result.resources != null and !#lists.isEmpty(result.resources)}">
                    <div th:each="resource : ${result.resources}"
                         class="border rounded-xl p-4 bg-gray-50">

                        <h3 class="font-semibold text-gray-800"
                            th:text="${resource.title}">
                        </h3>

                        <p class="text-sm text-gray-600 mt-2"
                           th:text="${resource.description}">
                        </p>

                        <a th:href="${resource.url}"
                           target="_blank"
                           rel="noopener noreferrer"
                           class="inline-block mt-3 text-green-700 font-semibold hover:underline">
                            公式サイトへ（外部サイト）
                        </a>
                    </div>
                </div>

                <p class="text-gray-700"
                   th:if="${result.resources == null or #lists.isEmpty(result.resources)}">
                    まだ関連リンクは登録されていません。
                </p>
            </div>
			
			<div class="mt-8 bg-lime-50 rounded-xl p-6" th:if="${!loggedIn}">
			    <h2 class="text-lg font-bold text-lime-700 mb-3">
			        診断結果を保存して、就農準備タスクを始めませんか？
			    </h2>

			    <p class="text-gray-700 leading-7">
			        会員登録すると、この診断結果に合わせた就農準備タスクを自動で作成して、
			        マイページで進捗管理できます。
			    </p>

			    <a href="/signup"
			       class="inline-block mt-4 bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700">
			        会員登録してタスクを始める
			    </a>
			</div>

            <div class="text-center">
                <a href="/"
                   class="inline-block mt-8 bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700">
                    トップへ戻る
                </a>
            </div>

        </div>
    </div>
</body>
</html>
