<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>マイページ</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50">

<div class="max-w-3xl mx-auto mt-20 bg-white p-8 rounded-2xl shadow">

<h1 class="text-3xl font-bold text-green-700">
こんにちは <span th:text="${userName}"></span> さん
</h1>

<p class="mt-3 text-gray-600">
あなたの就農準備タスク
</p>

<div class="mt-8 space-y-4">
	
	<div class="mt-6">

	<p class="text-sm text-gray-600">
	進捗
	<span th:text="${doneCount}"></span>
	/
	<span th:text="${totalCount}"></span>
	</p>

	<div class="w-full bg-gray-200 rounded-full h-4 mt-2">

	<div class="bg-green-500 h-4 rounded-full"
	     th:style="'width:' + ${progress} + '%'">
	</div>

	</div>

	</div>

	<div th:each="task : ${tasks}"
	     class="border rounded-xl p-4 bg-gray-50">

	    <p class="font-semibold"
	       th:text="${task.title}"></p>

	    <p class="text-sm text-gray-600"
	       th:text="${task.description}"></p>

	    <div class="mt-3 space-y-1"
	         th:each="link : ${taskResources[task.id]}">

	        <a th:href="${link.url}"
	           target="_blank"
	           class="text-green-700 underline">

	           <span th:text="${link.title}"></span>

	        </a>

	    </div>

	</div>

</div>

</div>

</body>
</html>
