<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>会員登録</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50">

<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow">

<h1 class="text-2xl font-bold text-green-700 mb-6">会員登録</h1>

<form method="post" action="/signup" class="space-y-4">

<input name="name" placeholder="名前"
class="w-full border rounded-lg p-3">

<input name="email" placeholder="メールアドレス"
class="w-full border rounded-lg p-3">

<input name="password" type="password" placeholder="パスワード"
class="w-full border rounded-lg p-3">

<button
class="w-full bg-green-600 text-white p-3 rounded-xl hover:bg-green-700">
登録
</button>

</form>

</div>

</body>
</html>
